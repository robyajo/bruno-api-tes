info:
  name: EMAIL Send Vefirfied
  type: http
  seq: 7

http:
  method: POST
  url: "{{domain}}/v1/auth/send-verification"
  headers:
    - name: Accept
      value: application/json
  body:
    type: json
    data: ""
  auth:
    type: bearer
    token: "{{TOKEN}}"

runtime:
  scripts:
    - type: after-response
      code: |-
        const data = res.getBody();

        if (data.success && data.data.tokens) {

            bru.setEnvVar("TOKEN", data.data.tokens.accessToken);

            console.log("Token saved:", data.data.tokens.accessToken);

        }

        if (data.success && data.data.tokens) {

            bru.setEnvVar("TOKEN-REFRESH", data.data.tokens.refreshToken);

            console.log("Token saved:", data.data.tokens.refreshToken);

        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
