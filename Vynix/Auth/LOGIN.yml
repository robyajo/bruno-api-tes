info:
  name: LOGIN
  type: http
  seq: 1

http:
  method: POST
  url: "{{domain}}/v1/auth/login"
  headers:
    - name: Accept
      value: application/json
  body:
    type: json
    data: |-
      // {
      //   "email":"user@vynix.com",
      //   "password":"password123"
      // }

      {
        "email":"admin@vynix.com",
        "password":"password123"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        const data = res.getBody();

        if (data.success && data.data.tokens) {

            bru.setEnvVar("TOKEN", data.data.tokens.accessToken);

            console.log("Token saved:", data.data.tokens.accessToken);

        }

        if (data.success && data.data.tokens) {

            bru.setEnvVar("TOKEN-REFRESH", data.data.tokens.refreshToken);

            console.log("Token saved:", data.data.tokens.refreshToken);

        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
