info:
  name: Resest-Password
  type: http
  seq: 11

http:
  method: POST
  url: "{{domain}}/v1/auth/reset-password"
  headers:
    - name: Accept
      value: application/json
  body:
    type: json
    data: |-
      {
        "token":"eaaf1bcfad469bcd4fc7680d1fa171eefbfe51f8015426f8c052966e5680371f",
        "password":"12341234",
        "confirmPassword":"12341234"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        const data = res.getBody();

        if (data.success && data.data.tokens) {

            bru.setEnvVar("TOKEN", data.data.tokens.accessToken);

            console.log("Token saved:", data.data.tokens.accessToken);

        }

        if (data.success && data.data.tokens) {

            bru.setEnvVar("TOKEN-REFRESH", data.data.tokens.refreshToken);

            console.log("Token saved:", data.data.tokens.refreshToken);

        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
