info:
  name: Login
  type: http
  seq: 1

http:
  method: POST
  url: "{{url_andi_dev}}/api/auth/login"
  headers:
    - name: Accept
      value: application/json
  body:
    type: multipart-form
    data:
      - name: email
        type: text
        value: user@example.com
      - name: password
        type: text
        value: string
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
