info:
  name: Login
  type: http
  seq: 1

http:
  method: POST
  url: https://dummy-api.lapeh.web.id/api/auth/login
  headers:
    - name: Accept
      value: application/json
  body:
    type: multipart-form
    data:
      - name: email
        type: text
        value: andi@gmail.com
      - name: password
        type: text
        value: "12341234"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
