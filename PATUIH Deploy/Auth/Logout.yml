info:
  name: Logout
  type: http
  seq: 6

http:
  method: POST
  url: "{{domain}}/v1/auth/logout"
  headers:
    - name: Accept
      value: application/json
  body:
    type: multipart-form
  auth:
    type: bearer
    token: "{{TOKEN}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
