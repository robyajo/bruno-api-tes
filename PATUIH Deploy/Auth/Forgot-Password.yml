info:
  name: Forgot-Password
  type: http
  seq: 10

http:
  method: POST
  url: "{{domain}}/v1/auth/forgot-password"
  headers:
    - name: Accept
      value: application/json
  body:
    type: json
    data: |-
      {
        "email":"robyfull.dev@gmail.com"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        const data = res.getBody();

        if (data.success && data.data.tokens) {

            bru.setEnvVar("TOKEN", data.data.tokens.accessToken);

            console.log("Token saved:", data.data.tokens.accessToken);

        }

        if (data.success && data.data.tokens) {

            bru.setEnvVar("TOKEN-REFRESH", data.data.tokens.refreshToken);

            console.log("Token saved:", data.data.tokens.refreshToken);

        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
