info:
  name: REFRESH Token
  type: http
  seq: 4

http:
  method: POST
  url: "{{domain}}/v1/auth/refresh"
  headers:
    - name: Accept
      value: application/json
  body:
    type: json
    data: |-
      
      {
        "refreshToken":"{{TOKEN}}"
      }
  auth:
    type: bearer
    token: "{{TOKEN}}"

runtime:
  scripts:
    - type: after-response
      code: |-
        const data = res.getBody();

        if (data.success && data.data.accessToken) {

            bru.setEnvVar("TOKEN", data.data.accessToken);

            console.log("Token saved:", data.data.accessToken);

        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
