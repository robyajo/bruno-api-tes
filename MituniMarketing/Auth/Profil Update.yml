info:
  name: Profil Update
  type: http
  seq: 9

http:
  method: PUT
  url: "{{domain}}/v1/user"
  headers:
    - name: Accept
      value: application/json
  body:
    type: multipart-form
    data:
      - name: name
        type: text
        value: roy
  auth:
    type: bearer
    token: "{{TOKEN}}"

runtime:
  scripts:
    - type: after-response
      code: |-
        const data = res.getBody();

        if (data.success && data.data.token) {

            bru.setEnvVar("TOKEN", data.data.token);

            console.log("Token saved:", data.data.token);

        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
