info:
  name: Register
  type: http
  seq: 1

http:
  method: POST
  url: "{{domain}}/api/auth/register"
  headers:
    - name: Accept
      value: application/json
  body:
    type: multipart-form
    data:
      - name: email
        type: text
        value: ""
      - name: password
        type: text
        value: ""
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
